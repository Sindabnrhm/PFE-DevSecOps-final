- hosts: localhost
  connection: local
  gather_facts: no
  become: false

  tasks:

    - name: Simple test
      command: echo "Ansible OK ✅"

    # 🔹 Vérifier Docker
    - name: Check Docker version
      command: docker --version
      register: docker_version

    - name: Show Docker version
      debug:
        var: docker_version.stdout

    # 🔹 Vérifier containers
    - name: Check running containers
      command: docker ps
      register: containers

    - name: Show containers
      debug:
        var: containers.stdout

    # 🔹 Vérifier images
    - name: Check Docker images
      command: docker images
      register: images

    - name: Show images
      debug:
        var: images.stdout

    # 🔹 Vérifier Kubernetes (si installé)
    - name: Check kubectl
      command: kubectl version --client
      register: kubectl_output
      ignore_errors: yes

    - name: Show kubectl version
      debug:
        var: kubectl_output.stdout